name: SEC Firm Monitor

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write  # Required for pushing back to repo

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      # ✅ FIX 1: Full clone + explicit branch checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Full history — enables clean rebase
          ref: main             # Explicitly checkout main, avoids detached HEAD

      # ✅ FIX 2: Configure git identity for the commit
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitoring script
        run: python main.py

      # ✅ FIX 3: Pull latest remote state before committing, then push
      - name: Commit and push updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add filtered_snapshot.json
          
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          
          git commit -m "chore: update filtered_snapshot.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          
          # Force-pull remote state and rebase our commit on top
          git fetch origin main
          git rebase origin/main
          
          # Push — if it still fails, force push only this file's history
          git push origin main || git push --force-with-lease origin main
